# Conda environment for this repository (Ultra-Seq / immunoediting analysis).
# Create:  conda env create -f UltraSeqImmune.yml
#
name: UltraSeqImmune
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pandas
  - numpy
  - scipy
  - matplotlib
  - seaborn=0.12.2
  - scikit-learn
  - statsmodels
  - pyarrow
  - regex
  - jupyter
  - ipykernel
